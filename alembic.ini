# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, aligned with src/ folder
prepend_sys_path = src

# timezone to use when rendering the date within the migration file
# timezone = UTC

# version locations
version_locations = alembic/versions

# database connection URL (will be overridden dynamically in env.py from settings)
sqlalchemy.url = postgresql+asyncpg://postgres:postgres_local_password_change_me@localhost:5432/alphalab

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
